    <style>
        body {
            min-height: 100vh;

            color: #fff;
            font-family: Arial;

            align-items: center;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: 40px 40px;

        h2 {

            color: #ffe599;
            margin-top: 0.5rem;
            margin-bottom: 0.25rem;
        }

        a,
        a:visited,
        a:active,
        a:hover {
            color: white;
            text-decoration: none;
        }

        .masonry {
            column-count: 3;
            column-gap: 0.3rem;
            max-width: 900px;
            margin: auto;
            margin-bottom: 3rem;
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 0.3rem;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            display: block;
        }

        .masonry-item img {
            width: 100%;
            display: block;
            height: auto;
        }

        /* Force 3 columns on all screen sizes */
        @media screen and (max-width: 767px) {
            .masonry {
                column-count: 3 !important;
            }
        }
    </style>

    <script>
        const audio = new Audio('click.mp3');
        audio.loop = false;
        audio.load();

        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.masonry-item a').forEach(function (el) {
                el.addEventListener('click', function (e) {
                    e.preventDefault();
                    audio.play();
                    el.getElementsByTagName('img')[0].style.filter = 'blur(1px) brightness(0.4)';
                    const src = el.getAttribute('href');
                    const overlay = document.createElement('div');
                    overlay.style.position = 'fixed';
                    overlay.style.top = 0;
                    overlay.style.left = 0;
                    overlay.style.width = '100vw';
                    overlay.style.height = '100vh';
                    overlay.style.background = 'radial-gradient(circle at center, #444, black) fixed';
                    overlay.style.display = 'flex';
                    overlay.style.alignItems = 'center';
                    overlay.style.justifyContent = 'center';
                    overlay.style.zIndex = 9999;

                    const img = document.createElement('img');
                    img.src = src;
                    img.style.maxHeight = '95vh';
                    img.style.maxWidth = '95vw';
                    img.style.boxShadow = '0 0 10px #000';
                    img.style.borderRadius = '8px';
                    if (window.innerWidth < 768) {
                        img.style.marginBottom = '4.5rem';
                    }

                    const closeBtn = document.createElement('span');
                    closeBtn.textContent = '✕';
                    closeBtn.style.position = 'fixed';
                    closeBtn.style.top = '2rem';
                    closeBtn.style.right = '2rem';
                    closeBtn.style.fontSize = '2rem';
                    closeBtn.style.color = '#fff';
                    closeBtn.style.cursor = 'pointer';
                    closeBtn.style.fontWeight = 'bold';
                    closeBtn.style.background = 'rgba(0,0,0,0.3)';
                    closeBtn.style.borderRadius = '50%';
                    closeBtn.style.padding = '0.5rem 1rem';
                    closeBtn.style.boxShadow = '0 2px 12px rgba(0,0,0,0.2)';

                    closeBtn.onclick = function () {
                        document.getElementById('masonry').classList.add('masonry');
                        document.body.removeChild(overlay);
                    };

                    overlay.onclick = function (e) {
                        if (e.target === overlay) closeBtn.onclick();
                    };

                    overlay.appendChild(img);
                    overlay.appendChild(closeBtn);
                    overlay.style.opacity = '0';
                    document.body.appendChild(overlay);

                    setTimeout(function () {
                        overlay.style.opacity = '1';
                        document.getElementById('masonry').classList.remove('masonry');
                    }, 200);

                });
            });
        });

        // Preload images
        for (let i = 1; i <= total_images; i++) {
            const img = new Image();
            img.src = `acting-indian-${i}.jpg`;
        }
    </script>
