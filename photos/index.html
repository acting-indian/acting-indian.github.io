<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Acting Indian Photos</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
            font-family: sans-serif;
        }
        .masonry {
            column-count: 3;
            column-gap: 16px;
            max-width: 1200px;
            margin: auto;
        }
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 16px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
            display: block;
        }
        .masonry-item img {
            width: 100%;
            display: block;
            height: auto;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Acting Indian Photos</h1>
    <div class="masonry">
           <div class="masonry-item"><a href="https://picsum.photos/id/1016/400/500"><img src="https://picsum.photos/id/1016/400/500" alt="Photo 2"></a></div>
           <div class="masonry-item"><a href="https://picsum.photos/id/1027/400/700"><img src="https://picsum.photos/id/1027/400/700" alt="Photo 3"></a></div>
           <div class="masonry-item"><a href="https://picsum.photos/id/1049/400/650"><img src="https://picsum.photos/id/1049/400/650" alt="Photo 5"></a></div>
           <div class="masonry-item"><a href="https://picsum.photos/id/1050/400/550"><img src="https://picsum.photos/id/1050/400/550" alt="Photo 6"></a></div>
           <div class="masonry-item"><a href="https://picsum.photos/id/1062/400/600"><img src="https://picsum.photos/id/1062/400/600" alt="Photo 7"></a></div>
           <div class="masonry-item"><a href="https://picsum.photos/id/1074/400/500"><img src="https://picsum.photos/id/1074/400/500" alt="Photo 8"></a></div>
    </div>
</body>
</html>
