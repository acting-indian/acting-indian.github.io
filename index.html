<style>
  .blinking-words-container {
    text-align: center;
    display: inline-block;
    line-height: 1.8rem !important;
  }
  .blinking-word {
    display: inline-block;
    opacity: 1;
    animation-direction: alternate;
    animation-iteration-count: infinite;
  }
  @keyframes wordBlink {
    0% { opacity: 1; }
    50% { opacity: 0.7; }
    100% { opacity: 1; }
  }
  .blinking-word:nth-child(1) {
    animation-name: wordBlink;
    animation-duration: 1s;
    animation-delay: 0s;
  }
  .blinking-word:nth-child(2) {
    animation-name: wordBlink;
    animation-duration: 1s;
    animation-delay: 0.15s;
  }
  .blinking-word:nth-child(3) {
    animation-name: wordBlink;
    animation-duration: 1s;
    animation-delay: 0.3s;
  }
  .blinking-word:nth-child(4) {
    animation-name: wordBlink;
    animation-duration: 1s;
    animation-delay: 0.45s;
  }
</style>
